# Codesteward Review — Release
#
# Triggered by version tags (e.g. v0.1.0). Pipeline:
#   1. test       — install, build, typecheck, unit tests (gate)
#   2. container  — build images, Trivy gate, push multi-arch, cosign, SBOM
#   3. release    — GitHub Release with changelog notes + scan assets
#
# Official repo: github.com/Codesteward/codesteward → GHCR (lowercased):
#   ghcr.io/codesteward/codesteward           — monorepo app (API + worker)
#   ghcr.io/codesteward/codesteward/ui        — product UI (nginx)
#   ghcr.io/codesteward/codesteward/keycloak  — Keycloak + theme/realm; tags = upstream KC version
#   oci://ghcr.io/codesteward/codesteward/charts/codesteward — Helm chart (product semver)
# Workflow derives paths from github.repository (works for forks too).
#
# Cosign keyless signing via GitHub OIDC. No Docker Hub credentials required.

name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:

  # ── Gate: tests must pass before we publish ────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r run build

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Unit tests
        run: pnpm run test:unit
        env:
          GRAPH_MOCK: "1"

  # ── Build, scan, push, sign container images ───────────────────────────────
  container:
    name: Container build, scan, sign
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      digest_app: ${{ steps.push-app.outputs.digest }}
      image_app: ${{ steps.meta-app.outputs.tags }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compute lowercased image names
        env:
          REPO: ${{ github.repository }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_APP=${REGISTRY}/${REPO_LC}" >> "$GITHUB_ENV"
          echo "IMAGE_UI=${REGISTRY}/${REPO_LC}/ui" >> "$GITHUB_ENV"
          echo "IMAGE_KEYCLOAK=${REGISTRY}/${REPO_LC}/keycloak" >> "$GITHUB_ENV"
          echo "REPO_LC=${REPO_LC}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Extract Docker metadata (ui)
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_UI }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Keycloak image tags follow upstream Keycloak (KEYCLOAK_VERSION), not product semver
      - name: Resolve Keycloak base version
        id: keycloak-ver
        run: |
          set -euo pipefail
          KC=$(tr -d '[:space:]' < deploy/compose/keycloak/KEYCLOAK_VERSION)
          if [[ ! "$KC" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid KEYCLOAK_VERSION: $KC" >&2
            exit 1
          fi
          # minor alias: 26.7.0 -> 26.7
          if [[ "$KC" =~ ^([0-9]+\.[0-9]+)\.[0-9]+$ ]]; then
            MINOR="${BASH_REMATCH[1]}"
          else
            MINOR="$KC"
          fi
          echo "version=$KC" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "Keycloak base: $KC (minor tag $MINOR)"

      - name: Extract Docker metadata (keycloak)
        id: meta-keycloak
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_KEYCLOAK }}
          tags: |
            type=raw,value=${{ steps.keycloak-ver.outputs.version }}
            type=raw,value=${{ steps.keycloak-ver.outputs.minor }}
            type=raw,value=latest

      # STEP 1 — Build amd64 locally for Trivy gate
      - name: Build app image for scan (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/Dockerfile.node
          push: false
          load: true
          tags: codesteward-review:scan
          build-args: |
            SERVICE=api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) TARCH=64bit ;;
            aarch64|arm64) TARCH=ARM64 ;;
            *) echo "unsupported arch $ARCH"; exit 1 ;;
          esac
          URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-${TARCH}.tar.gz"
          echo "Downloading Trivy from $URL"
          curl -fsSL "$URL" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          chmod +x /usr/local/bin/trivy
          trivy --version

      - name: Trivy scan (gate — HIGH/CRITICAL fails the release)
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --skip-version-check \
            --ignorefile .trivyignore \
            --format json \
            --output trivy-report.json \
            codesteward-review:scan

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 2 — Multi-arch push with provenance + SBOM attestation
      - name: Build and push app (api/worker monorepo)
        id: push-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/Dockerfile.node
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          build-args: |
            SERVICE=api
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI
        id: push-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/Dockerfile.ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keycloak + theme/realm; tags = upstream Keycloak version (see KEYCLOAK_VERSION)
      - name: Build and push Keycloak
        id: push-keycloak
        uses: docker/build-push-action@v6
        with:
          context: deploy/compose/keycloak
          file: deploy/compose/keycloak/Dockerfile
          push: true
          tags: ${{ steps.meta-keycloak.outputs.tags }}
          labels: ${{ steps.meta-keycloak.outputs.labels }}
          build-args: |
            KEYCLOAK_VERSION=${{ steps.keycloak-ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # STEP 3 — cosign keyless
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images (keyless via GitHub OIDC)
        env:
          DIGEST_APP: ${{ steps.push-app.outputs.digest }}
          DIGEST_UI: ${{ steps.push-ui.outputs.digest }}
          DIGEST_KEYCLOAK: ${{ steps.push-keycloak.outputs.digest }}
          TAGS_APP: ${{ steps.meta-app.outputs.tags }}
          TAGS_UI: ${{ steps.meta-ui.outputs.tags }}
          TAGS_KEYCLOAK: ${{ steps.meta-keycloak.outputs.tags }}
        run: |
          set -euo pipefail
          sign_tags() {
            local digest="$1"
            shift
            local images=""
            for tag in "$@"; do
              images+="${tag}@${digest} "
            done
            # shellcheck disable=SC2086
            cosign sign --yes ${images}
          }
          # metadata-action emits newline-separated tags
          mapfile -t app_tags <<< "$TAGS_APP"
          mapfile -t ui_tags <<< "$TAGS_UI"
          mapfile -t kc_tags <<< "$TAGS_KEYCLOAK"
          sign_tags "$DIGEST_APP" "${app_tags[@]}"
          sign_tags "$DIGEST_UI" "${ui_tags[@]}"
          sign_tags "$DIGEST_KEYCLOAK" "${kc_tags[@]}"

      # STEP 4 — SBOM for release assets
      - name: Install syft
        env:
          SYFT_VERSION: "1.18.1"
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) TARCH=amd64 ;;
            aarch64|arm64) TARCH=arm64 ;;
            *) echo "unsupported arch $ARCH"; exit 1 ;;
          esac
          URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_${TARCH}.tar.gz"
          curl -fsSL "$URL" -o /tmp/syft.tgz
          tar -xzf /tmp/syft.tgz -C /usr/local/bin syft
          chmod +x /usr/local/bin/syft
          syft version

      - name: Generate SBOM from pushed app image
        env:
          DIGEST: ${{ steps.push-app.outputs.digest }}
        run: |
          syft "${IMAGE_APP}@${DIGEST}" -o cyclonedx-json > sbom.cdx.json

      - name: Upload container reports
        uses: actions/upload-artifact@v4
        with:
          name: container-reports
          path: |
            trivy-report.json
            sbom.cdx.json
          if-no-files-found: error

      # STEP 5 — Helm chart → GHCR OCI + release asset
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Package and push Helm chart (OCI → GHCR)
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          CHART_DIR=deploy/helm/codesteward
          OUT_DIR="${RUNNER_TEMP}/helm-chart"
          mkdir -p "$OUT_DIR"

          # Align Chart.yaml with the git tag (semver without leading v)
          sed -i "s/^version: .*/version: ${VERSION}/" "$CHART_DIR/Chart.yaml"
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" "$CHART_DIR/Chart.yaml"

          # Default image tag in values matches this release when still on chart appVersion pattern
          if grep -q 'tag: ".*"' "$CHART_DIR/values.yaml"; then
            sed -i "0,/tag: \".*\"/s//tag: \"${VERSION}\"/" "$CHART_DIR/values.yaml" || true
          fi

          helm lint "$CHART_DIR"
          helm package "$CHART_DIR" --destination "$OUT_DIR" --version "$VERSION" --app-version "$VERSION"

          TGZ=$(ls "$OUT_DIR"/codesteward-*.tgz | head -1)
          echo "Packaged: $TGZ"
          # oci://ghcr.io/<owner>/<repo>/charts  → chart name "codesteward"
          helm push "$TGZ" "oci://${REGISTRY}/${REPO_LC}/charts"

          # Stash for GitHub Release assets
          cp "$TGZ" "./codesteward-${VERSION}.tgz"
          echo "CHART_TGZ=codesteward-${VERSION}.tgz" >> "$GITHUB_ENV"
          echo "Pushed oci://${REGISTRY}/${REPO_LC}/charts/codesteward:${VERSION}"

      - name: Upload Helm chart package
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: codesteward-*.tgz
          if-no-files-found: error

  # ── Create GitHub release ──────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [container]
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download container reports
        uses: actions/download-artifact@v4
        with:
          name: container-reports
          path: container-reports/

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: helm-chart/

      - name: Extract changelog for this version
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG section for ${VERSION}; using Unreleased/fallback." >&2
            echo "Release ${GITHUB_REF_NAME}" > /tmp/release-notes.md
          fi
          {
            echo ""
            echo "## Container images"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LC}:${VERSION}"
            echo "docker pull ghcr.io/${REPO_LC}/ui:${VERSION}"
            KC=$(tr -d '[:space:]' < deploy/compose/keycloak/KEYCLOAK_VERSION 2>/dev/null || echo latest)
            echo "docker pull ghcr.io/${REPO_LC}/keycloak:${KC}   # tag = upstream Keycloak, not product ${VERSION}"
            echo '```'
            echo ""
            echo "App image runs API by default (\`SERVICE=api\`). Worker:"
            echo '```bash'
            echo "docker run --rm -e SERVICE=worker ghcr.io/${REPO_LC}:${VERSION}"
            echo '```'
            echo ""
            echo "Keycloak image tags match **upstream Keycloak** (theme + realm baked in; no git mounts):"
            echo '```bash'
            echo "docker run --rm -p 8083:8083 -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD=admin \\"
            echo "  ghcr.io/${REPO_LC}/keycloak:${KC} start-dev --import-realm --http-port=8083"
            echo '```'
            echo ""
            echo "## Helm chart (OCI on GHCR)"
            echo ""
            echo '```bash'
            echo "helm install codesteward oci://ghcr.io/${REPO_LC}/charts/codesteward --version ${VERSION}"
            echo "# or: helm pull oci://ghcr.io/${REPO_LC}/charts/codesteward --version ${VERSION}"
            echo '```'
            echo ""
            echo "Chart package is also attached to this release as \`codesteward-${VERSION}.tgz\`."
            echo "Docs: Kubernetes quick start in the product documentation site."
            echo ""
            echo "Images are signed with [cosign](https://github.com/sigstore/cosign) keyless via GitHub OIDC."
            echo "Verify with:"
            echo '```bash'
            echo "cosign verify ghcr.io/${REPO_LC}:${VERSION} \\"
            echo "  --certificate-identity-regexp 'https://github.com/${REPO}/.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } >> /tmp/release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            container-reports/trivy-report.json
            container-reports/sbom.cdx.json
            helm-chart/*.tgz
          generate_release_notes: false

# Codesteward Review — Weekly scheduled security scans
#
# Runs CodeQL, pnpm audit, Trivy (published image), and gitleaks
# every Monday 06:00 UTC.

name: Scheduled Security Scans

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:

  codeql:
    name: CodeQL (scheduled)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  pnpm-audit:
    name: pnpm audit (scheduled)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

  trivy-image:
    name: Trivy image scan (latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) TARCH=64bit ;;
            aarch64|arm64) TARCH=ARM64 ;;
            *) echo "unsupported arch $ARCH"; exit 1 ;;
          esac
          URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-${TARCH}.tar.gz"
          echo "Downloading Trivy from $URL"
          curl -fsSL "$URL" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          chmod +x /usr/local/bin/trivy
          trivy --version

      - name: Scan published app image
        env:
          REPO: ${{ github.repository }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy.sarif \
            "ghcr.io/${REPO_LC}:latest"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-image

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

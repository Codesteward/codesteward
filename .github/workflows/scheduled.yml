# Codesteward — Weekly scheduled security scans
#
# Runs CodeQL, pip-audit, Trivy (against the published image), and gitleaks
# every Monday 06:00 UTC. Purpose: catch newly-published CVEs / leaked secrets
# in code that hasn't changed since the last PR.

name: Scheduled Security Scans

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:

  codeql:
    name: CodeQL (scheduled)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  pip-audit:
    name: pip-audit (scheduled)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Export locked requirements
        run: |
          uv export --frozen --no-hashes --format requirements-txt --all-packages \
            --extra graph-all > requirements-locked.txt

      - name: Run pip-audit
        run: uvx pip-audit -r requirements-locked.txt

  trivy-image:
    name: Trivy image scan (latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3
          trivy --version

      - name: Scan published image
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            ghcr.io/${{ github.repository }}:latest

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-image

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Codesteward Review — OpenSSF Scorecard
#
# Separate workflow because it needs `id-token: write` to publish results and
# `security-events: write` to upload SARIF. Isolating these permissions from
# the main CI limits blast radius.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Scorecard calls api.github.com; GitHub 5xx/outages show up as
      # "repo unreachable: GET … 503". Retry once after a short backoff.
      - name: Run Scorecard
        id: scorecard
        continue-on-error: true
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Wait before Scorecard retry
        if: steps.scorecard.outcome == 'failure'
        run: sleep 45

      - name: Retry Scorecard
        id: scorecard_retry
        if: steps.scorecard.outcome == 'failure'
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Fail if Scorecard still failing
        if: |
          steps.scorecard.outcome == 'failure' &&
          (steps.scorecard_retry.outcome == 'failure' || steps.scorecard_retry.outcome == 'skipped')
        run: |
          echo "::error::OpenSSF Scorecard failed (often transient GitHub API 503). Re-run the workflow or check https://www.githubstatus.com/"
          exit 1

      - name: Upload SARIF
        if: steps.scorecard.outcome == 'success' || steps.scorecard_retry.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: scorecard

# Allows worker/sandbox-controller to create short-lived Prove Jobs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "codesteward.name" . }}-sandbox
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "codesteward.name" . }}-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "codesteward.name" . }}-sandbox
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}

apiVersion: v1
kind: Secret
metadata:
  name: codesteward-secrets
  labels:
    {{- include "codesteward.labels" . | nindent 4 }}
type: Opaque
stringData:
  openaiApiKey: {{ .Values.secrets.openaiApiKey | quote }}
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  xaiApiKey: {{ .Values.secrets.xaiApiKey | default "" | quote }}
  githubToken: {{ .Values.secrets.githubToken | quote }}
  githubWebhookSecret: {{ .Values.secrets.githubWebhookSecret | quote }}
  gitlabToken: {{ .Values.secrets.gitlabToken | default "" | quote }}
  gitlabWebhookSecret: {{ .Values.secrets.gitlabWebhookSecret | default "" | quote }}
  apiKey: {{ .Values.secrets.apiKey | default "" | quote }}
  databaseUrl: {{ .Values.secrets.databaseUrl | default .Values.database.url | default "" | quote }}
  databasePassword: {{ .Values.secrets.databasePassword | default "steward" | quote }}

{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codesteward.name" . }}-keycloak
  labels:
    {{- include "codesteward.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args:
            {{- if .Values.keycloak.production }}
            - start
            - --import-realm
            - --http-enabled=true
            {{- if .Values.keycloak.hostname }}
            - --hostname={{ .Values.keycloak.hostname }}
            {{- end }}
            {{- else }}
            - start-dev
            - --import-realm
            - --http-port={{ .Values.keycloak.port }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.keycloak.port }}
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "codesteward.name" . }}-secrets
                  key: keycloakAdminPassword
                  optional: true
            - name: KC_HTTP_PORT
              value: {{ .Values.keycloak.port | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            {{- if .Values.keycloak.hostname }}
            - name: KC_HOSTNAME_URL
              value: {{ printf "https://%s" .Values.keycloak.hostname | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codesteward.name" . }}-keycloak
  labels:
    {{- include "codesteward.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: {{ .Values.keycloak.service.type }}
  selector:
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.keycloak.port }}
      targetPort: http
{{- end }}

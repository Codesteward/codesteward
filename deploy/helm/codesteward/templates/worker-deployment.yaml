apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codesteward.name" . }}-worker
  labels:
    {{- include "codesteward.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["node", "services/worker/dist/index.js"]
          env:
            - name: GRAPH_MOCK
              value: {{ .Values.env.GRAPH_MOCK | quote }}
            - name: GRAPH_MCP_MODE
              value: "stdio"
            - name: GRAPH_MCP_COMMAND
              value: "/opt/graph-venv/bin/codesteward-mcp"
            - name: GRAPH_BACKEND
              value: {{ .Values.graph.backend | quote }}
            {{- if eq .Values.graph.backend "neo4j" }}
            - name: NEO4J_URI
              {{- if .Values.graph.neo4j.uri }}
              value: {{ .Values.graph.neo4j.uri | quote }}
              {{- else }}
              value: {{ printf "bolt://%s-neo4j:%v" (include "codesteward.name" .) (.Values.graph.neo4j.boltPort | default 7687) | quote }}
              {{- end }}
            - name: NEO4J_USER
              value: {{ .Values.graph.neo4j.user | default "neo4j" | quote }}
            - name: NEO4J_PASSWORD
              value: {{ .Values.graph.neo4j.password | default "changeme" | quote }}
            {{- end }}
            {{- if eq .Values.graph.backend "janusgraph" }}
            - name: JANUSGRAPH_URL
              {{- if .Values.graph.janusgraph.url }}
              value: {{ .Values.graph.janusgraph.url | quote }}
              {{- else }}
              value: {{ printf "ws://%s-janusgraph:%v/gremlin" (include "codesteward.name" .) (.Values.graph.janusgraph.gremlinPort | default 8182) | quote }}
              {{- end }}
            {{- end }}
            {{- if or (eq .Values.graph.backend "graphqlite") (eq .Values.graph.backend "auto") }}
            - name: GRAPHQLITE_PATH
              value: /data/graph.db
            {{- end }}
            - name: STEW_MAX_CONCURRENT
              value: {{ .Values.worker.maxConcurrent | quote }}
            - name: AGENT_MAX_CONCURRENT
              value: {{ .Values.worker.maxConcurrent | quote }}
            - name: STEW_SANDBOX_PROVIDER
              value: {{ .Values.sandbox.provider | quote }}
            - name: STEW_SANDBOX_IMAGE
              value: {{ .Values.sandbox.jobImage | quote }}
            - name: STEW_USE_DEEPAGENTS
              value: {{ .Values.env.STEW_USE_DEEPAGENTS | quote }}
            - name: STEW_MENTION_TOKEN
              value: {{ .Values.webhooks.mentionToken | default "@codesteward" | quote }}
            {{- if .Values.worker.queueBroker }}
            - name: STEW_QUEUE_BROKER
              value: {{ .Values.worker.queueBroker | quote }}
            {{- end }}
            - name: MODEL_PROVIDER
              value: {{ .Values.env.MODEL_PROVIDER | quote }}
            - name: MODEL_NAME
              value: {{ .Values.env.MODEL_NAME | quote }}
            - name: STEW_DATA_DIR
              value: /data
            # Clones local to this worker; embedded graph MCP parses the same paths
            - name: STEW_WORKSPACE_DIR
              value: /workspace
            - name: OTEL_ENABLED
              value: {{ .Values.env.OTEL_ENABLED | default "0" | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: databaseUrl
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: openaiApiKey
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: anthropicApiKey
                  optional: true
            - name: SPACEXAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: xaiApiKey
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: xaiApiKey
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codesteward-secrets
                  key: githubToken
                  optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspaces
              mountPath: /workspace
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "codesteward.name" . }}-data
        - name: workspaces
          persistentVolumeClaim:
            claimName: {{ include "codesteward.name" . }}-data

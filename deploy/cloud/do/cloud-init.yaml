#cloud-config
# Codesteward trial user-data for DigitalOcean (or any cloud-init host).
# Paste into Droplet "Startup scripts / User data", or prefer ../deploy.sh (doctl).
# This installs Codesteward via first-boot.sh — it is NOT the Docker Marketplace app.
# Marketplace fabricator may bake /opt/codesteward so the clone step is skipped.
package_update: true
packages:
  - curl
  - ca-certificates
  - gnupg
  - git
  - openssl
  - python3
  - jq

runcmd:
  - |
    set -euo pipefail
    # DO user-data can set domain via droplet metadata tags later; env file optional
    if [[ -f /etc/codesteward/boot.env ]]; then
      set -a
      # shellcheck disable=SC1091
      . /etc/codesteward/boot.env
      set +a
    fi
    INSTALL_DIR=/opt/codesteward
    if [[ ! -d "$INSTALL_DIR/deploy/cloud" ]]; then
      git clone --depth 1 --branch "${GIT_REF:-main}" https://github.com/Codesteward/codesteward.git "$INSTALL_DIR"
    fi
    export DOMAIN="${DOMAIN:-}"
    export ACME_EMAIL="${ACME_EMAIL:-}"
    export IMAGE_TAG="${IMAGE_TAG:-1.5.0}"
    bash "$INSTALL_DIR/deploy/cloud/first-boot.sh"

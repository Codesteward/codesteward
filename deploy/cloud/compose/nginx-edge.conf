# Edge proxy for cloud trial.
# - HTTPS (self-signed or LE) so browser PKCE has crypto.subtle
# - Keycloak is under /auth (KC_HTTP_RELATIVE_PATH=/auth)
# - SPA OIDC callback is also named /auth/callback — must hit the UI, not Keycloak

server {
  listen 80;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  client_max_body_size 50m;

  ssl_certificate     /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  # Exact match wins over prefix /auth/ — SPA PKCE callback (React route)
  location = /auth/callback {
    proxy_pass http://ui:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /oidc/callback {
    proxy_pass http://ui:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /auth/ {
    proxy_pass http://keycloak:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
    proxy_read_timeout 120s;
  }

  location = /auth {
    return 301 /auth/;
  }

  location / {
    proxy_pass http://ui:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
  }
}

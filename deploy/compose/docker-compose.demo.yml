# CodeSteward Review — demo stack with embedded Graph (stdio in worker)
# Usage:
#   export OPENAI_API_KEY=...
#   docker compose -f deploy/compose/docker-compose.demo.yml up --build
name: codesteward-demo

x-graph-env: &graph-env
  GRAPH_MOCK: "0"
  GRAPH_MCP_MODE: stdio
  GRAPH_MCP_COMMAND: codesteward-mcp
  GRAPH_BACKEND: graphqlite
  GRAPHQLITE_PATH: /data/graph.db

services:
  postgres:
    image: postgres:16-alpine
    container_name: codesteward-postgres
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: codesteward
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward -d codesteward"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: api
    environment:
      <<: *graph-env
      PORT: "8081"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-insecure}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      REPO_PATH: /repos/project
      STEW_USE_DEEPAGENTS: ${STEW_USE_DEEPAGENTS:-1}
      STEW_INLINE_WORKER: ${STEW_INLINE_WORKER:-0}
    ports:
      - "8081:8081"
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: worker
    environment:
      <<: *graph-env
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AGENT_MAX_CONCURRENT: ${AGENT_MAX_CONCURRENT:-8}
      STEW_MAX_CONCURRENT: ${STEW_MAX_CONCURRENT:-8}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      REPO_PATH: /repos/project
      STEW_SANDBOX_PROVIDER: ${STEW_SANDBOX_PROVIDER:-null}
      STEW_USE_DEEPAGENTS: ${STEW_USE_DEEPAGENTS:-1}
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  ui:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  stew-data:
  stew-workspaces:
  pg-data:

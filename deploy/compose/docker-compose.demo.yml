# CodeSteward Review — full demo stack with GraphQLite MCP
# Usage:
#   export OPENAI_API_KEY=...
#   docker compose -f deploy/compose/docker-compose.demo.yml up --build
name: codesteward-demo

services:
  postgres:
    image: postgres:16-alpine
    container_name: codesteward-postgres
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: codesteward
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward -d codesteward"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  graph-mcp:
    image: ghcr.io/bitkaio/codesteward:latest
    # Fallback local build if image pull fails — use upstream Dockerfile
    # build:
    #   context: ../../research/source/codesteward
    #   dockerfile: Dockerfile.mcp
    #   args:
    #     INSTALL_EXTRA: "graph-all,graphqlite"
    container_name: codesteward-graph-mcp
    environment:
      TRANSPORT: "sse"
      HOST: "0.0.0.0"
      PORT: "3000"
      GRAPH_BACKEND: "graphqlite"
      GRAPHQLITE_PATH: "/data/graph.db"
      DEFAULT_TENANT_ID: "local"
      DEFAULT_REPO_ID: "demo"
      DEFAULT_REPO_PATH: "/repos/project"
      WORKSPACE_BASE: "/workspace"
      LOG_LEVEL: "INFO"
    ports:
      - "3000:3000"
    volumes:
      - graph-data:/data
      - ${REPO_PATH:-../..}:/repos/project:ro
      - stew-workspaces:/workspace
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: api
    environment:
      PORT: "8081"
      GRAPH_MOCK: "0"
      GRAPH_MCP_URL: "http://graph-mcp:3000/sse"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-insecure}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      REPO_PATH: /repos/project
      STEW_USE_DEEPAGENTS: ${STEW_USE_DEEPAGENTS:-1}
    ports:
      - "8081:8081"
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      graph-mcp:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: worker
    environment:
      GRAPH_MOCK: "0"
      GRAPH_MCP_URL: "http://graph-mcp:3000/sse"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AGENT_MAX_CONCURRENT: ${AGENT_MAX_CONCURRENT:-8}
      STEW_MAX_CONCURRENT: ${STEW_MAX_CONCURRENT:-8}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      REPO_PATH: /repos/project
      STEW_SANDBOX_PROVIDER: ${STEW_SANDBOX_PROVIDER:-null}
      STEW_USE_DEEPAGENTS: ${STEW_USE_DEEPAGENTS:-1}
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
      # optional docker.sock for LocalSandbox docker mode
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      graph-mcp:
        condition: service_started
    deploy:
      replicas: 1

  ui:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  stew-data:
  stew-workspaces:
  graph-data:
  pg-data:

# CodeSteward + Keycloak (OIDC reference IdP)
#
# Production / no git checkout: pull the released image (theme + realm baked in):
#   export KEYCLOAK_IMAGE=ghcr.io/codesteward/codesteward/keycloak:1.1.0
#   docker compose -f deploy/compose/docker-compose.keycloak.yml up -d
#
# Local dev (default): build from deploy/compose/keycloak/Dockerfile
#   docker compose -f deploy/compose/docker-compose.keycloak.yml up -d --build
#
name: codesteward-keycloak

services:
  keycloak:
    image: ${KEYCLOAK_IMAGE:-codesteward-keycloak:local}
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    command:
      [
        "start-dev",
        "--import-realm",
        "--http-port=8083",
        "--spi-theme-static-max-age=-1",
        "--spi-theme-cache-themes=false",
        "--spi-theme-cache-templates=false",
      ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8083
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-http://localhost:8083}
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL:-http://localhost:8083}
    ports:
      - "8083:8083"
    # Theme + realm are inside the image. Optional override for custom realm only:
    # volumes:
    #   - ./keycloak/realm-codesteward.json:/opt/keycloak/data/import/realm-codesteward.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8083"]
      interval: 10s
      timeout: 5s
      retries: 12

  # OIDC_ISSUER=http://localhost:8083/realms/codesteward
  # OIDC_CLIENT_ID=codesteward-ui
  # STEW_IDENTITY_MODE=keycloak

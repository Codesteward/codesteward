# CodeSteward Review — JanusGraph shared backend + embedded Graph MCP in workers
# Usage:
#   export REPO_PATH=/path/to/repo OPENAI_API_KEY=...
#   docker compose -f deploy/compose/docker-compose.janusgraph.yml up -d
name: codesteward-janus

x-graph-env: &graph-env
  GRAPH_MOCK: "0"
  GRAPH_MCP_MODE: stdio
  GRAPH_MCP_COMMAND: /opt/graph-venv/bin/codesteward-mcp
  GRAPH_BACKEND: janusgraph
  JANUSGRAPH_URL: ws://janusgraph:8182/gremlin

services:
  postgres:
    image: postgres:16-alpine
    container_name: codesteward-postgres
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: codesteward
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward -d codesteward"]
      interval: 5s
      timeout: 5s
      retries: 10

  janusgraph:
    image: janusgraph/janusgraph:1.1.0
    container_name: codesteward-janusgraph
    environment:
      JANUS_PROPS_TEMPLATE: "berkeleyje-lucene"
      JAVA_OPTIONS: "-Xms512m -Xmx1g"
    ports:
      - "8182:8182"
    volumes:
      - janusgraph-data:/var/lib/janusgraph
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8182)); s.close()\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: api
    environment:
      <<: *graph-env
      PORT: "8081"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      STEW_API_KEY: ${STEW_API_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-insecure}
      REPO_PATH: /repos/project
      STEW_INLINE_WORKER: "0"
    ports:
      - "8081:8081"
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      janusgraph:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: worker
    environment:
      <<: *graph-env
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
      STEW_DATA_DIR: /data
      STEW_WORKSPACE_DIR: /workspace
      DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
      STEW_SANDBOX_PROVIDER: ${STEW_SANDBOX_PROVIDER:-local}
      STEW_MAX_CONCURRENT: ${STEW_MAX_CONCURRENT:-8}
      REPO_PATH: /repos/project
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      janusgraph:
        condition: service_started
      api:
        condition: service_started

  ui:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pg-data:
  janusgraph-data:
  stew-data:
  stew-workspaces:

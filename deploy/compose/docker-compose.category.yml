# Category-leader stock stack: Postgres + API + Worker (embedded Graph MCP) + UI + Keycloak
# Usage:
#   export OPENAI_API_KEY=... STEW_SECRETS_KEY=$(openssl rand -hex 32)
#   docker compose -f deploy/compose/docker-compose.category.yml up --build -d
name: codesteward-category

x-stew-env: &stew-env
  PORT: "8081"
  GRAPH_MOCK: "0"
  # Graph MCP runs embedded in the worker (stdio) — no graph-mcp service / shared clone mount
  GRAPH_MCP_MODE: stdio
  GRAPH_MCP_COMMAND: codesteward-mcp
  GRAPH_BACKEND: ${GRAPH_BACKEND:-graphqlite}
  GRAPHQLITE_PATH: /data/graph.db
  STEW_DEBUG_LLM: ${STEW_DEBUG_LLM:-1}
  STEW_CODE_TOKEN_BUDGET: ${STEW_CODE_TOKEN_BUDGET:-14000}
  MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  MODEL_NAME: ${MODEL_NAME:-gpt-4.1-mini}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}
  SPACEXAI_API_KEY: ${SPACEXAI_API_KEY:-${XAI_API_KEY:-}}
  STEW_DATA_DIR: /data
  # Clones stay on the worker only; embedded graph MCP parses local paths.
  STEW_WORKSPACE_DIR: /workspace
  DATABASE_URL: postgres://steward:steward@postgres:5432/codesteward
  REPO_PATH: /repos/project
  # Clone target SCM repos for stewardship (never silently review REPO_PATH platform tree)
  STEW_WORKSPACE_CLONE: ${STEW_WORKSPACE_CLONE:-1}
  # API + dedicated worker must not double-claim jobs
  STEW_INLINE_WORKER: ${STEW_INLINE_WORKER:-0}
  STEW_USE_DEEPAGENTS: "1"
  STEW_REQUIRE_TOOL_AGENTS: "1"
  STEW_AUTH_STRICT: ${STEW_AUTH_STRICT:-1}
  STEW_SECRETS_KEY: ${STEW_SECRETS_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  STEW_API_KEY: ${STEW_API_KEY:-category-demo-api-key-change-me}
  STEW_PUBLIC_URL: ${STEW_PUBLIC_URL:-http://localhost:8080}
  # Browser-reachable API (manifest redirect). Webhooks need a *public* URL — set tunnel for live GH:
  #   STEW_WEBHOOK_PUBLIC_URL=https://xxxx.ngrok-free.app  (or smee.io proxy target)
  STEW_API_PUBLIC_URL: ${STEW_API_PUBLIC_URL:-http://localhost:8081}
  STEW_WEBHOOK_PUBLIC_URL: ${STEW_WEBHOOK_PUBLIC_URL:-}
  GITHUB_APP_NAME: ${GITHUB_APP_NAME:-Codesteward}
  OIDC_ISSUER: http://keycloak:8083/realms/codesteward
  OIDC_PUBLIC_ISSUER: http://localhost:8083/realms/codesteward
  OIDC_CLIENT_ID: codesteward-ui
  OIDC_REDIRECT_URI: http://localhost:8081/v1/auth/oidc/callback
  # Identity SoT: Keycloak (login OIDC-only; Members/orgs managed via KC Admin API)
  STEW_IDENTITY_MODE: ${STEW_IDENTITY_MODE:-keycloak}
  KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-codesteward-api}
  KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-steward-api-dev-secret-change-me}
  OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
  GITHUB_APP_ID: ${GITHUB_APP_ID:-}
  GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
  GITHUB_APP_PRIVATE_KEY_REF: ${GITHUB_APP_PRIVATE_KEY_REF:-}
  GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
  GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
  GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-category-webhook-secret}
  # PR comment trigger (string match on issue_comment body). Brand handle: @codesteward
  STEW_MENTION_TOKEN: ${STEW_MENTION_TOKEN:-@codesteward}
  STEW_SANDBOX_PROVIDER: ${STEW_SANDBOX_PROVIDER:-local}
  STEW_REQUIRE_PG_TENANCY: "1"
  # SCIM 2.0 (IdP directory provisioning) — Bearer token for /scim/v2/*
  STEW_SCIM_TOKEN: ${STEW_SCIM_TOKEN:-}
  STEW_SCIM_ORG_ID: ${STEW_SCIM_ORG_ID:-local}
  STEW_SCIM_HARD_DELETE: ${STEW_SCIM_HARD_DELETE:-0}
  STEW_AUDIT_RETENTION_DAYS: ${STEW_AUDIT_RETENTION_DAYS:-365}
  # Langfuse — all review LLM calls share sessionId = review session id
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
  STEW_LANGFUSE_TRACE_MODE: ${STEW_LANGFUSE_TRACE_MODE:-session}
  STEW_LANGFUSE_REDACT: ${STEW_LANGFUSE_REDACT:-1}
  # Optional job dispatch broker (KEDA). Empty = Postgres/file SoT only.
  # rabbitmq | nats | pulsar — requires matching URL below
  STEW_QUEUE_BROKER: ${STEW_QUEUE_BROKER:-}
  NATS_URL: ${NATS_URL:-}
  RABBITMQ_URL: ${RABBITMQ_URL:-}
  AMQP_URL: ${AMQP_URL:-}
  STEW_RABBITMQ_QUEUE: ${STEW_RABBITMQ_QUEUE:-codesteward.reviews}
  PULSAR_URL: ${PULSAR_URL:-}
  STEW_PULSAR_TOPIC: ${STEW_PULSAR_TOPIC:-persistent://public/default/codesteward-reviews}
  STEW_PULSAR_SUBSCRIPTION: ${STEW_PULSAR_SUBSCRIPTION:-stew-worker}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: codesteward
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward -d codesteward"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: ${KEYCLOAK_IMAGE:-codesteward-keycloak:local}
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    # --spi-theme-static-max-age=-1 helps pick up theme CSS during dev
    command:
      [
        "start-dev",
        "--import-realm",
        "--http-port=8083",
        "--spi-theme-static-max-age=-1",
        "--spi-theme-cache-themes=false",
        "--spi-theme-cache-templates=false",
      ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8083
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
      # Hostname for browser redirects (public)
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-http://localhost:8083}
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL:-http://localhost:8083}
    ports:
      - "8083:8083"

  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: api
    environment:
      <<: *stew-env
    ports:
      - "8081:8081"
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.node
      args:
        SERVICE: worker
    environment:
      <<: *stew-env
    volumes:
      - stew-data:/data
      - stew-workspaces:/workspace
      - ${REPO_PATH:-../..}:/repos/project:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  ui:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  stew-data:
  # Session SCM clones (primary + cross-repo) on worker volume only
  stew-workspaces:
  graph-data:
  pg-data:

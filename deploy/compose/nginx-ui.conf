server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /v1/ {
    proxy_pass http://api:8081/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /healthz {
    proxy_pass http://api:8081/healthz;
  }

  location / {
    try_files $uri /index.html;
  }
}

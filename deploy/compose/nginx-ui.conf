server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS — re-resolve service names so a restarted `api`
  # container is not stuck on a stale IP (classic cause of 502 → SPA falls
  # back to local password login instead of Keycloak OIDC).
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  location /v1/ {
    set $stew_api_upstream api:8081;
    proxy_pass http://$stew_api_upstream/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location /healthz {
    set $stew_api_upstream api:8081;
    proxy_pass http://$stew_api_upstream/healthz;
  }

  location / {
    try_files $uri /index.html;
  }
}

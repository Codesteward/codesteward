# Merge this into ~/.codex/config.yaml
#
# Codex CLI reads AGENTS.md from:
#   ~/AGENTS.md          (global — copy templates/global-codex/AGENTS.md here)
#   <repo-root>/AGENTS.md
#   <cwd>/AGENTS.md
#
# MCP server is spawned as a subprocess via stdio — no Docker, no volume mounts.
# The codesteward-taint binary is auto-detected on PATH if installed.
#
# GraphQLite (default): embedded SQLite — no server, no Docker, persistent graph.
# Neo4j alternative:    set GRAPH_BACKEND=neo4j + NEO4J_URI/NEO4J_USER/NEO4J_PASSWORD
# JanusGraph alt:       set GRAPH_BACKEND=janusgraph + JANUSGRAPH_URL

# ── GraphQLite backend (default — no server needed) ───────────────────────
mcp_servers:
  codesteward-graph:
    command: uvx
    args:
      - "--from"
      - "codesteward-mcp[graph-all,graphqlite]"
      - "codesteward-mcp"
      - "--transport"
      - "stdio"

# ── Neo4j backend (alternative) ───────────────────────────────────────────
# Uncomment below (and comment out the GraphQLite block above) to use Neo4j:
#
# mcp_servers:
#   codesteward-graph:
#     command: uvx
#     args:
#       - "--from"
#       - "codesteward-mcp[graph-all]"
#       - "codesteward-mcp"
#       - "--transport"
#       - "stdio"
#     env:
#       GRAPH_BACKEND: "neo4j"
#       NEO4J_URI: "bolt://localhost:7687"
#       NEO4J_USER: "neo4j"
#       NEO4J_PASSWORD: "your-neo4j-password"

# ── JanusGraph backend (alternative) ──────────────────────────────────────
# Uncomment below (and comment out the GraphQLite block above) to use JanusGraph:
#
# mcp_servers:
#   codesteward-graph:
#     command: uvx
#     args:
#       - "--from"
#       - "codesteward-mcp[graph-all,janusgraph]"
#       - "codesteward-mcp"
#       - "--transport"
#       - "stdio"
#     env:
#       GRAPH_BACKEND: "janusgraph"
#       JANUSGRAPH_URL: "ws://localhost:8182/gremlin"

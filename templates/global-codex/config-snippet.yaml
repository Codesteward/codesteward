# Merge this into ~/.codex/config.yaml
#
# Codex CLI reads AGENTS.md from:
#   ~/AGENTS.md          (global — copy templates/global-codex/AGENTS.md here)
#   <repo-root>/AGENTS.md
#   <cwd>/AGENTS.md
#
# MCP server is spawned as a subprocess via stdio — no Docker, no volume mounts.
# The codesteward-taint binary is auto-detected on PATH if installed.

mcp_servers:
  codesteward:
    command: uvx
    args:
      - "codesteward-mcp[graph-all]"
      - "--transport"
      - "stdio"
    env:
      NEO4J_URI: "bolt://localhost:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "your-neo4j-password"

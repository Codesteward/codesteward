<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Codesteward Review — govern every merge, steward every branch." />
    <link rel="icon" type="image/png" href="/brand/codesteward-icon.png" />
    <link rel="apple-touch-icon" href="/brand/codesteward-icon.png" />
    <title>Codesteward Review</title>
    <script>
      // Prevent flash of wrong theme before React mounts
      (function () {
        try {
          var p = localStorage.getItem("cs-theme");
          var dark = true;
          if (p === "light") dark = false;
          else if (p === "system")
            dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          // legacy: only "light" was stored; anything else → dark
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
